<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="petal">
      <path d="M0,0 C -5,-9 -5,-18 0,-24 C 5,-18 5,-9 0,0 Z"
            fill="none" stroke="#c9974a" stroke-width="1.2" stroke-opacity="0.5"/>
    </g>
    <g id="lotus">
      <use href="#petal" transform="rotate(0)"/>
      <use href="#petal" transform="rotate(45)"/>
      <use href="#petal" transform="rotate(90)"/>
      <use href="#petal" transform="rotate(135)"/>
      <use href="#petal" transform="rotate(180)"/>
      <use href="#petal" transform="rotate(225)"/>
      <use href="#petal" transform="rotate(270)"/>
      <use href="#petal" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="3.2" fill="#7a1f2b" fill-opacity="0.5" stroke="none"/>
    </g>
    <g id="dotring">
      <circle cx="0" cy="-10" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="7" cy="-7" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="10" cy="0" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="7" cy="7" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="0" cy="10" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="-7" cy="7" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="-10" cy="0" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
      <circle cx="-7" cy="-7" r="1.4" fill="#c9974a" fill-opacity="0.45" stroke="none"/>
    </g>
  </defs>

  <use href="#lotus" x="45" y="40" transform="scale(0.9)"/>
  <use href="#lotus" x="210" y="30" transform="rotate(20 210 30) scale(0.75)"/>
  <use href="#lotus" x="245" y="150"/>
  <use href="#lotus" x="80" y="190" transform="rotate(-15 80 190) scale(0.85)"/>
  <use href="#lotus" x="160" y="235" transform="rotate(35 160 235) scale(0.7)"/>
  <use href="#lotus" x="15" y="245" transform="scale(0.8)"/>

  <use href="#dotring" x="130" y="100"/>
  <use href="#dotring" x="30" y="130" transform="scale(0.7)"/>
  <use href="#dotring" x="200" y="90" transform="scale(0.8)"/>
  <use href="#dotring" x="110" y="250" transform="scale(0.6)"/>
</svg>
