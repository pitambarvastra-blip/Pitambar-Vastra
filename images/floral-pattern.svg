        <ellipse cx="0" cy="-9" rx="5" ry="8"/>
        <ellipse cx="8.5" cy="-2.8" rx="5" ry="8" transform="rotate(72 8.5 -2.8)"/>
        <ellipse cx="5.3" cy="7.3" rx="5" ry="8" transform="rotate(144 5.3 7.3)"/>
