<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Pitambar Vastra</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html"><h1 class="logo">Pitambar Vastra</h1></a>
    </div>
  </header>

  <main>
    <div class="orders-page">

      <div id="orders-login">
        <h1>Orders</h1>
        <p>Enter your admin password to view orders.</p>
        <input type="password" id="orders-password" placeholder="Password">
        <button id="orders-login-btn" class="checkout-btn">View Orders</button>
        <p id="orders-login-error" class="orders-error"></p>
      </div>

      <div id="orders-content" style="display:none;">
        <div class="orders-header-row">
          <h1>Orders</h1>
          <button id="orders-refresh-btn" class="wishlist-toggle">Refresh</button>
        </div>
        <div id="orders-list"></div>

        <div class="orders-header-row" style="margin-top:40px;">
          <h1>Reviews</h1>
          <button id="reviews-refresh-btn" class="wishlist-toggle">Refresh</button>
        </div>
        <div id="reviews-admin-list"></div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Pitambar Vastra</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
    const CURRENCY_SYMBOL = "₹";
    let adminPassword = "";

    // Order/review fields come from public, unauthenticated form submissions —
    // escape before inserting into innerHTML so a crafted name/address/review
    // can't run script in this admin page.
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : String(str);
      return div.innerHTML;
    }

    function renderOrders(orders) {
      const listEl = document.getElementById("orders-list");
      if (orders.length === 0) {
        listEl.innerHTML = `<p class="cart-empty">No orders yet.</p>`;
        return;
      }

      listEl.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-card-top">
            <span class="order-id">${escapeHtml(o.orderId)}</span>
            <span class="order-date">${new Date(o.placedAt).toLocaleString("en-IN")}</span>
          </div>
          <div class="order-items">
            ${o.items.map(i => `<div>${escapeHtml(i.name)}${i.size ? ` (Size ${escapeHtml(i.size)})` : ""} x${i.qty} — ${CURRENCY_SYMBOL}${i.price * i.qty}</div>`).join("")}
          </div>
          <div class="order-totals">
            Subtotal: ${CURRENCY_SYMBOL}${o.subtotal} &nbsp;|&nbsp;
            Shipping: ${CURRENCY_SYMBOL}${o.shipping} &nbsp;|&nbsp;
            <strong>Total: ${CURRENCY_SYMBOL}${o.total}</strong>
          </div>
          <div class="order-payment">
            Payment: ${o.paymentMethod === "cod" ? "Cash on Delivery" : "Paid Online"}
            ${o.paymentId ? ` (ID: ${escapeHtml(o.paymentId)})` : ""}
          </div>
          <div class="order-customer">
            <strong>${escapeHtml(o.customer.name)}</strong><br>
            ${escapeHtml(o.customer.phone)}<br>
            ${escapeHtml(o.customer.address)}${o.customer.pincode ? ` — ${escapeHtml(o.customer.pincode)}` : ""}
          </div>
          ${o.customizationImage || o.sizeHelpImage ? `
            <div class="order-uploads">
              ${o.customizationImage ? `<div class="order-upload-item"><span>Custom design reference:</span><img src="${o.customizationImage}" alt="Custom design reference"></div>` : ""}
              ${o.sizeHelpImage ? `<div class="order-upload-item"><span>Laddu Gopal photo (sizing help):</span><img src="${o.sizeHelpImage}" alt="Laddu Gopal sizing photo"></div>` : ""}
            </div>
          ` : ""}
        </div>
      `).join("");
    }

    function renderReviewsAdmin(reviews) {
      const listEl = document.getElementById("reviews-admin-list");
      if (reviews.length === 0) {
        listEl.innerHTML = `<p class="cart-empty">No reviews yet.</p>`;
        return;
      }

      listEl.innerHTML = reviews.map(r => `
        <div class="order-card">
          <div class="order-card-top">
            <span class="order-id">${escapeHtml(r.name || "Anonymous")}${r.rating ? " — " + "★".repeat(r.rating) + "☆".repeat(5 - r.rating) : ""}</span>
            <span class="order-date">${new Date(r.createdAt).toLocaleString("en-IN")}</span>
          </div>
          ${r.text ? `<div class="order-items">${escapeHtml(r.text)}</div>` : ""}
          ${r.image ? `<div class="order-uploads"><img src="${r.image}" alt="Review photo"></div>` : ""}
          ${r.video ? `<div class="order-uploads"><video src="${r.video}" controls style="max-width:220px;"></video></div>` : ""}
          ${r.videoLink ? `<div class="order-payment"><a href="${escapeHtml(r.videoLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.videoLink)}</a></div>` : ""}
          <div class="order-customer">
            <button type="button" class="remove-btn" data-review-id="${escapeHtml(r.reviewId)}">Delete review</button>
          </div>
        </div>
      `).join("");

      listEl.querySelectorAll("[data-review-id]").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Delete this review? This cannot be undone.")) return;
          try {
            await fetch("/.netlify/functions/delete-review", {
              method: "POST",
              body: JSON.stringify({ password: adminPassword, reviewId: btn.dataset.reviewId })
            });
            loadReviewsAdmin();
          } catch (err) {
            alert("Could not delete review. Please try again.");
          }
        });
      });
    }

    async function loadReviewsAdmin() {
      try {
        const res = await fetch("/.netlify/functions/get-reviews");
        const data = await res.json();
        renderReviewsAdmin(data.reviews || []);
      } catch (err) {
        // best-effort — orders are the primary content on this page
      }
    }

    async function loadOrders() {
      const errEl = document.getElementById("orders-login-error");
      errEl.textContent = "";
      try {
        const res = await fetch("/.netlify/functions/get-orders", {
          method: "POST",
          body: JSON.stringify({ password: adminPassword })
        });
        if (!res.ok) {
          errEl.textContent = "Incorrect password.";
          return;
        }
        const data = await res.json();
        document.getElementById("orders-login").style.display = "none";
        document.getElementById("orders-content").style.display = "block";
        renderOrders(data.orders);
        loadReviewsAdmin();
      } catch (err) {
        errEl.textContent = "Something went wrong. Please try again.";
      }
    }

    document.getElementById("orders-login-btn").addEventListener("click", () => {
      adminPassword = document.getElementById("orders-password").value;
      loadOrders();
    });
    document.getElementById("orders-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("orders-login-btn").click();
    });
    document.getElementById("orders-refresh-btn").addEventListener("click", loadOrders);
    document.getElementById("reviews-refresh-btn").addEventListener("click", loadReviewsAdmin);
  </script>
</body>
</html>
